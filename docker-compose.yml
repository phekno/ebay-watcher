services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ebay_watcher
      POSTGRES_USER: ebay
      POSTGRES_PASSWORD: ebay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebay -d ebay_watcher"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://ebay:ebay@postgres:5432/ebay_watcher?sslmode=disable
      EBAY_CLIENT_ID: ${EBAY_CLIENT_ID}
      EBAY_CLIENT_SECRET: ${EBAY_CLIENT_SECRET}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
